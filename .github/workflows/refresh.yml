name: Atualizar Dados DeFi

on:
  schedule:
    # Roda todo dia às 12:00 UTC (09:00 Brasília)
    - cron: '0 12 * * *'
  # Permite rodar manualmente pelo GitHub (botão "Run workflow")
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar refresh_data.py
        env:
          CI: true
        run: python refresh_data.py

      - name: Commit e push dos dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add defi_pools.json market_data.json index.html
          git diff --cached --quiet || git commit -m "dados: refresh automático $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
